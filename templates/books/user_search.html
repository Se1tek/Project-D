<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Поиск друзей</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow-sm p-4">
        <h2 class="mb-4">Найти книголюбов</h2>
    <form action="{% url 'user_search' %}" method="get" class="d-flex mb-4">
        <input type="text" name="q" value="{{ query|default:'' }}" class="form-control me-2" placeholder="Введите ник или ID">
        <button type="submit" class="btn btn-primary">Поиск</button>
    </form>

    <hr>

    <div class="results">
        {% for u in users %}
            <div class="card mb-2 shadow-sm">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <strong>{{ u.username }}</strong> 
                        <span class="text-muted small">(ID: {{ u.id }})</span>
                    </div>
                    <a href="#" class="btn btn-sm btn-outline-success">Добавить в друзья</a>
                </div>
            </div>
        {% empty %}
            {% if query %}
                <p class="text-center text-muted">Пользователь "{{ query }}" не найден.</p>
            {% endif %}
        {% endfor %}
    </div>
</body>
</html>
