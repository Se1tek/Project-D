<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ЛитВечер | Мероприятия</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #f8f9fa;">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="{% url 'book_list' %}">📚 ЛитВечер</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-white" href="{% url 'book_list' %}">Библиотека</a>
            <a class="nav-link text-white" href="{% url 'profile' %}">👤 Мой профиль</a>
        </div>
    </div>
</nav>

<div class="container">
    <h1 class="text-center mb-5">Ближайшие литературные вечера</h1>
    <div class="row">
        {% for event in events %}
        <div class="col-md-6 mb-4">
            <div class="card h-100 shadow-sm border-primary">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title text-primary">{{ event.title }}</h5>
                    <p class="text-muted mb-2">
                        📅 <strong>Дата:</strong> {{ event.date_start|date:"d.m.Y H:i" }}
                    </p>
                    <p class="card-text">{{ event.description }}</p>
                    <div class="mt-auto">
                        <button class="btn btn-outline-primary w-100">Записаться на вечер</button>
                    </div>
                </div>
            </div>
        </div>
        {% empty %}
        <div class="col-12 text-center">
            <p class="lead text-muted">Пока нет запланированных вечеров. Но они скоро появятся!</p>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
