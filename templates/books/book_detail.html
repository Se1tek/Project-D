<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ book.title }} | Чтение</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .book-content {
            font-size: 1.2rem;
            line-height: 1.8;
            color: #2c3e50;
            max-width: 800px;
            margin: 0 auto;
            text-align: justify;
        }
    </style>
</head>
<body style="background-color: #fdfcf0;"> <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="{% url 'book_list' %}">← Назад в библиотеку</a>
    </div>
</nav>

<div class="container mb-5">
    <div class="row">
        <div class="col-md-4">
            {% if book.image %}
                <img src="{{ book.image.url }}" class="img-fluid rounded shadow" alt="{{ book.title }}">
            {% endif %}
            <div class="mt-3">
                <h4>{{ book.title }}</h4>
                <p class="text-muted">Автор: {{ book.author }}</p>
                {% if book.genre %}
                    <span class="badge bg-info text-dark">{{ book.genre.name }}</span>
                {% endif %}
            </div>
        </div>
        
        <div class="col-md-8">
            <h1 class="mb-4">О книге</h1>
            <div class="book-content p-4 bg-white rounded shadow-sm">
                {{ book.description|linebreaks }}
            </div>
        </div>
    </div>
</div>

</body>
</html>
